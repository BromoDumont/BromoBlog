{{ define "head" }} 
    {{- partial "heads/baseHead.html" . -}}
    {{- $extraCss := resources.Get "styles/journaling.css" -}}
    <link rel="stylesheet" href="{{ $extraCss.RelPermalink }}">
{{ end }}

{{ define "main" }}
<main>
    <article>
        <h1>{{ .Title }}</h1>
        <p class="date">{{ time.Format "Mon, 02/Jan/06" .PublishDate }}</p>
        {{ .Content }}
        {{- partial "commentSection.html" . -}}
    </article>
</main>
{{ end }}
