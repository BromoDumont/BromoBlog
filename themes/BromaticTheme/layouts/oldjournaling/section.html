{{ define "head" }} 
    {{- partial "heads/baseHead.html" . -}}
    {{- $extraCss := resources.Get "styles/journaling.css" -}}
    <link rel="stylesheet" href="{{ $extraCss.RelPermalink }}">
{{ end }}

{{ define "main" }}
<main>
    <div class="articleIndex">
        {{ range (.Paginate .Pages).Pages }}
            {{- partial "pagePreviews/articlePreview.html" . -}}
        {{ end }}
    </div>
</main>
{{ end }}
