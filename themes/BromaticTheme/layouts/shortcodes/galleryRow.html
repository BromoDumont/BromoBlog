<div class="galleryRow">
{{ range .Params }}
    {{ with resources.Get (printf "imgs/%s" .) }}
        <img 
            class="lightbox-img" 
            src="{{ .RelPermalink }}" 
            style="--width: {{ .Width }}; --height: {{ .Height }}"
            alt="Image" 
            loading="lazy">
    {{ end }}
{{ end }}
</div>
