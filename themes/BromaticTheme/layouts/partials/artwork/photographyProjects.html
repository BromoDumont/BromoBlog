{{ $project01Thumb := resources.Get .Params.projectThumb }}
<a href="{{ .RelPermalink }}" class="projectThumb">
    <img src="{{ $project01Thumb.RelPermalink }}" alt="PotiKatu Logo">
    <div class="projectInfo">
        <p>{{ .Title }}</p>
        <hr>
        {{ with index (.GetTerms "tags") 0 }}
            <p>{{ .LinkTitle }}</p>
        {{ end }}
    </div>
</a>
