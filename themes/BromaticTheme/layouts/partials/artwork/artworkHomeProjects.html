{{ $project01Thumb := resources.Get .Params.projectThumb }}
<a href="{{ .Params.link | default .RelPermalink | relURL }}" class="projectThumb">
    <img src="{{ $project01Thumb.RelPermalink }}" alt="PotiKatu Logo" style="--thumbAspectRatio: {{ .Params.thumbAspectRatio | default "16/9" | safeCSS }};">
    <div class="projectInfo">
        <p>{{ .Title }}</p>
        <hr>
        {{ with index (.GetTerms "tags") 0 }}
            <p>{{ .LinkTitle }}</p>
        {{ end }}
    </div>
</a>
